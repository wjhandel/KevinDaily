version: '3.8'

services:
  web:
    build: .
    container_name: kevin-daily-web
    ports:
      - "3000:3000"
    environment:
      - VITE_PB_URL=${VITE_PB_URL:-http://localhost:8090}
    restart: unless-stopped

  pocketbase:
    image: pocketbase/pocketbase:v6
    container_name: kevin-daily-db
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
      - ./pb/pb_migrations:/pb_migrations:ro
    command: ["--dir", "/pb/pb_data", "--migrations-dir", "/pb_migrations"]
    restart: unless-stopped

volumes:
  pb_data:
