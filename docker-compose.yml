services:
  web:
    build: .
    image: kevin-daily-web:latest
    container_name: kevin-daily-web
    ports:
      - "3000:3000"
    environment:
      - VITE_PB_URL=http://pocketbase:8090
    depends_on:
      - pocketbase
    restart: unless-stopped

  pocketbase:
    image: spectado/pocketbase
    container_name: kevin-daily-db
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
    command: ["serve", "--http=0.0.0.0:8090"]
    restart: unless-stopped

volumes:
  pb_data:
